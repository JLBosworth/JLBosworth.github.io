document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

animation:drawLine .8s .3s both\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono';font-size:12px;color:#A39A8C\">Est. 2012<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Sora';font-weight:700;font-size:clamp(48px,7.4vw,104px);line-height:.98;letter-spacing:-.04em;margin:0;max-width:11ch;animation:fadeUp .7s .05s both\">I build the interfaces the <span style=\"color:#0E7AB8\">mission<\u002Fspan> runs on.<\u002Fh1>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:54px;max-width:880px;animation:fadeUp .7s .15s both\">\n        <p style=\"font-size:19px;line-height:1.62;color:#3D382F;margin:0\">Front-end application developer with two decades across the ODNI, NGA, FBI, the Navy, and other federal agencies — building on classified networks, under real constraints, for work that quietly holds.<\u002Fp>\n        <p style=\"font-size:19px;line-height:1.62;color:#3D382F;margin:0\">The code is solid. The interface is intentional. The design is never an afterthought — and the clearance has never lapsed.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:28px;align-items:center;margin-top:46px;animation:fadeUp .7s .25s both\">\n        <a href=\"#work\" onclick=\"{{ goWork }}\" style=\"font-family:'IBM Plex Mono';font-size:13px;color:#FBFAF7;background:#161412;padding:15px 26px;transition:background .25s\" style-hover=\"background:#0E7AB8\">Selected work&nbsp;→<\u002Fa>\n        <a href=\"index.html\" style=\"font-family:'IBM Plex Mono';font-size:13px;color:#161412;border-bottom:1.5px solid #161412;padding-bottom:3px;transition:color .2s,border-color .2s\" style-hover=\"color:#0E7AB8;border-color:#0E7AB8\">Read the resume<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CREDENTIAL ROW -->\n    <section style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid #161412;border-bottom:1px solid #E2DDD3\">\n      <div style=\"padding:30px 28px 30px 0\">\n        <div style=\"font-family:'Sora';font-weight:700;font-size:34px;letter-spacing:-.03em\">TS/SCI<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono';font-size:11.5px;letter-spacing:.04em;color:#8A8275;margin-top:8px\">+ CI Polygraph · active<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:30px 28px;border-left:1px solid #E2DDD3\">\n        <div style=\"font-family:'Sora';font-weight:700;font-size:34px;letter-spacing:-.03em\">14<span style=\"font-size:18px;color:#A39A8C;font-weight:500\"> yrs<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono';font-size:11.5px;letter-spacing:.04em;color:#8A8275;margin-top:8px\">cleared, unbroken<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:30px 28px;border-left:1px solid #E2DDD3\">\n        <div style=\"font-family:'Sora';font-weight:700;font-size:34px;letter-spacing:-.03em\">6<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono';font-size:11.5px;letter-spacing:.04em;color:#8A8275;margin-top:8px\">IC &amp; federal agencies<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:30px 0 30px 28px;border-left:1px solid #E2DDD3\">\n        <div style=\"font-family:'Sora';font-weight:700;font-size:34px;letter-spacing:-.03em\">0<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono';font-size:11.5px;letter-spacing:.04em;color:#8A8275;margin-top:8px\">security incidents<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SELECTED WORK -->\n    <section id=\"work\" style=\"padding:84px 0 40px\">\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-bottom:8px\">\n        <span style=\"font-family:'IBM Plex Mono';font-size:12.5px;letter-spacing:.16em;color:#0E7AB8\">SELECTED WORK<\u002Fspan>\n        <span style=\"height:1px;flex:1;background:#E2DDD3\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono';font-size:12px;color:#A39A8C\">case studies in progress<\u002Fspan>\n      <\u002Fdiv>\n\n      <sc-for list=\"{{ cases }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <article style=\"display:grid;grid-template-columns:64px 200px 1fr auto;gap:36px;align-items:center;padding:38px 0;border-bottom:1px solid #E2DDD3;position:relative\">\n          <div style=\"position:absolute;left:0;right:0;bottom:0;height:2px;background:#EFE9DD;overflow:hidden\"><div style=\"position:absolute;top:0;bottom:0;width:26%;background:linear-gradient(90deg,transparent,#0E7AB8,transparent);animation:barSweep 2.2s ease-in-out infinite\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'Sora';font-weight:700;font-size:30px;color:#CFC8BB;letter-spacing:-.03em\">{{ c.num }}<\u002Fdiv>\n          <div style=\"width:200px\">\n            <sc-if value=\"{{ c.showThumb }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"width:200px;height:118px;overflow:hidden;border:1px solid #E2DDD3\"><image-slot id=\"{{ c.slotId }}\" shape=\"rect\" style=\"width:200px;height:118px;display:block\" placeholder=\"{{ c.name }}\"><\u002Fimage-slot><\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ c.showPlaceholder }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"width:200px;height:118px;background:repeating-linear-gradient(135deg,#F2EEE4 0 10px,#FBFAF7 10px 20px);border:1px solid #E2DDD3;display:flex;align-items:center;justify-content:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#BDB4A4\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\"><\u002Frect><circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"><\u002Fcircle><path d=\"M21 15l-5-5L5 21\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Sora';font-weight:700;font-size:27px;letter-spacing:-.02em;margin:0 0 11px\">{{ c.name }}<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.62;color:#4D473D;margin:0 0 14px;max-width:560px\">{{ c.summary }}<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap\">\n              <sc-for list=\"{{ c.skills }}\" as=\"sk\" hint-placeholder-count=\"3\"><span style=\"font-family:'IBM Plex Mono';font-size:11px;color:#5A534B;border:1px solid #D8D2C6;padding:4px 9px\">{{ sk }}<\u002Fspan><\u002Fsc-for>\n              <span style=\"font-family:'IBM Plex Mono';font-size:11px;color:#A39A8C\">{{ c.year }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:9px;padding-left:12px\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E7AB8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"1\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-family:'IBM Plex Mono';font-size:10px;font-weight:500;letter-spacing:.14em;color:#0E7AB8;text-align:center;line-height:1.5\">COMING<br>SOON<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fsection>\n\n    <!-- CONTACT -->\n    <section id=\"contact\" style=\"padding:70px 0 90px;border-top:1px solid #161412;margin-top:44px\">\n      <div style=\"display:grid;grid-template-columns:1fr auto;gap:48px;align-items:end\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono';font-size:12.5px;letter-spacing:.14em;color:#0E7AB8;margin-bottom:22px\">GET IN TOUCH<\u002Fdiv>\n          <h2 style=\"font-family:'Sora';font-weight:700;font-size:clamp(32px,4.6vw,56px);line-height:1.04;letter-spacing:-.03em;margin:0;max-width:16ch\">Building something the mission depends on?<\u002Fh2>\n        <\u002Fdiv>\n        <a href=\"{{ emailHref }}\" style=\"font-family:'IBM Plex Mono';font-size:13px;color:#FBFAF7;background:#0E7AB8;padding:17px 30px;white-space:nowrap;transition:transform .25s\" style-hover=\"transform:translateY(-2px)\">{{ email }}&nbsp;→<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:28px;margin-top:48px;font-family:'IBM Plex Mono';font-size:12.5px;color:#8A8275\">\n        <span>© 2026 Jennifer L. Bosworth<\u002Fspan>\n        <span style=\"margin-left:auto\"><\u002Fspan>\n        <a href=\"https://github.com/JLBosworth\" style=\"transition:color .2s\" style-hover=\"color:#0E7AB8\">github<\u002Fa>\n        <a href=\"https://linkedin.com/in/JLBosworth\" style=\"transition:color .2s\" style-hover=\"color:#0E7AB8\">linkedin<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  scrollToId = (id) => {\n    const el = document.getElementById(id);\n    if (el) { try { window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 80, behavior: 'smooth' }); } catch (e) {} }\n  };\n  renderVals() {\n    const u = 'jennifer', d = 'jlbosworth.dev';\n    const cases = [\n      { num: '01', name: 'ICJobs', year: '02/2025 – Present', showThumb: true, showPlaceholder: false, slotId: 'ed-icjobs',\n        skills: ['AngularJS 1.x', 'ServiceNow Portal', 'JSON'],\n        summary: 'Interactive UI mockups and wireframes I built for the IC job board, realized as a ServiceNow platform — elevated to a top-5 ODNI strategic priority and the IC\\u2019s primary staffing initiative, with a roadmap to IC-wide onboarding.' },\n      { num: '02', name: 'IRIS Design System Modernization', year: '02/2025 – 09/2025', showThumb: false, showPlaceholder: true, slotId: 'ed-iris',\n        skills: ['Angular 17', 'TypeScript', 'Angular Material'],\n        summary: 'UI modernization for IRIS — the IC budgeting application that prepares and routes monetary and budgetary information to Congress for approval — rebuilding legacy modules on a tokenized Angular/Angular Material design system.' },\n      { num: '03', name: 'SharePoint Component System', year: '04/2023 – 02/2025', showThumb: false, showPlaceholder: true, slotId: 'ed-sp',\n        skills: ['JSLink', 'USWDS', 'UXDS'],\n        summary: 'A reusable JSLink + USWDS/UXDS component library across 25+ classified SharePoint sites at NGA — standardizing branding, layout, and accessibility on both high-side Classic and low-side SP2016.' }\n    ];\n    return {\n      cases,\n      email: u + '@' + d,\n      emailHref: 'mailto:' + u + '@' + d,\n      goWork: () => this.scrollToId('work'),\n      goContact: () => this.scrollToId('contact')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
